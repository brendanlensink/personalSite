<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>{% if page.title %}{{ page.title }} - {% endif %}Brendan Lensink</title>
    <meta name="description" content="{{ page.excerpt | default: 'Brendan Lensink — product thinking, taste, and personal projects.' | strip_html | truncate: 160 }}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-16x16.png" sizes="16x16" />
    <link rel="manifest" href="/img/favicon/manifest.json" />
    <link rel="mask-icon" href="/img/favicon/safari-pinned-tab.svg" color="#5bbad5" />
    <meta name="theme-color" content="#154B62" />

    <link rel="stylesheet" href="/css/normalize.css" />
    <link rel="stylesheet/less" type="text/css" href="/css/style.less" />
    <link rel="stylesheet/less" type="text/css" href="/css/blog.less" />
    <script src="/js/less.min.js" type="text/javascript"></script>

    <link href="https://pvinis.github.io/iosevka-webfont/3.4.1/iosevka.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/c080eea525.js"></script>
  </head>
  <body>
    <div class="blog-container">
      <nav class="blog-nav" aria-label="Site navigation">
        <a href="/">Home</a>
        <span class="blog-nav-sep" aria-hidden="true">/</span>
        <a href="/blog">Blog</a>
      </nav>

      {% if page.show_post_header %}
      <article>
        <header class="post-header">
          <h1 class="post-title">{{ page.title }}</h1>
          <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%B %d, %Y" }}
          </time>
        </header>
        {{ content }}
      </article>
      {% else %}
      {{ content }}
      {% endif %}
    </div>
  </body>
</html>
